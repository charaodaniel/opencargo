<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OpenCargo — Logística Colaborativa</title>
  <meta name="description" content="OpenCargo - Plataforma open source para logística colaborativa" />

  <!-- ═══ PWA Meta Tags ═══ -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OpenCargo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="OpenCargo" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon-512.svg" />

  <!-- ═══ Tailwind CSS CDN ═══ -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS (carregado sob demanda pelo MapsPage) -->

  <!-- ═══ Custom Styles ═══ -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- ═══ Favicon ═══ -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg" />
  <link rel="mask-icon" href="assets/icons/icon-192.svg" color="#2563eb" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen antialiased">

  <div id="app"></div>

  <script src="assets/js/utils/storage.js"></script>

  <script src="assets/js/utils/api.js"></script>
  <script src="assets/js/utils/geocoding.js"></script>

  <script src="assets/js/pages/landing.js"></script>

  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
