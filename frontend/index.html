<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCargo — Logística Colaborativa</title>

  <!-- Tailwind CSS (CDN para MVP) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()">
  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200" x-show="auth.token">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-blue-600">OpenCargo</h1>
        </div>
        <div class="flex items-center space-x-4">
          <template x-for="link in navLinks" :key="link.name">
            <button
              @click="currentView = link.view"
              class="px-3 py-2 rounded-md text-sm font-medium"
              :class="currentView === link.view ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:text-gray-900'"
              x-text="link.name">
            </button>
          </template>
          <button @click="logout()" class="text-red-500 hover:text-red-700 text-sm font-medium">
            Sair
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Login / Register -->
  <div x-show="!auth.token" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-center mb-6" x-text="auth.isLogin ? 'Entrar' : 'Criar Conta'"></h2>

    <form @submit.prevent="auth.isLogin ? login() : register()" class="space-y-4">
      <template x-if="!auth.isLogin">
        <div>
          <label class="block text-sm font-medium text-gray-700">Nome</label>
          <input type="text" x-model="auth.form.name" required
            class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </template>

      <div>
        <label class="block text-sm font-medium text-gray-700">E-mail</label>
        <input type="email" x-model="auth.form.email" required
          class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Senha</label>
        <input type="password" x-model="auth.form.password" required minlength="6"
          class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <template x-if="!auth.isLogin">
        <div>
          <label class="block text-sm font-medium text-gray-700">Tipo</label>
          <select x-model="auth.form.role"
            class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="driver">Motorista</option>
            <option value="company">Empresa</option>
          </select>
        </div>
      </template>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">
        <span x-text="auth.isLogin ? 'Entrar' : 'Criar Conta'"></span>
      </button>

      <p class="text-center text-sm text-gray-500">
        <span x-text="auth.isLogin ? 'Não tem conta?' : 'Já tem conta?'"></span>
        <a href="#" @click.prevent="auth.isLogin = !auth.isLogin" class="text-blue-600 hover:underline">
          <span x-text="auth.isLogin ? 'Cadastre-se' : 'Faça login'"></span>
        </a>
      </p>
    </form>

    <p x-show="auth.error" x-text="auth.error" class="mt-4 text-red-500 text-sm text-center"></p>
  </div>

  <!-- Dashboard -->
  <div x-show="auth.token" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Dashboard -->
    <div x-show="currentView === 'dashboard'">
      <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h3 class="text-sm font-medium text-gray-500">Cargas Ativas</h3>
          <p class="text-3xl font-bold mt-2" x-text="stats.activeLoads">0</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h3 class="text-sm font-medium text-gray-500">Rotas Ativas</h3>
          <p class="text-3xl font-bold mt-2" x-text="stats.activeRoutes">0</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h3 class="text-sm font-medium text-gray-500">Matches</h3>
          <p class="text-3xl font-bold mt-2" x-text="stats.matches">0</p>
        </div>
      </div>
    </div>

    <!-- Loads -->
    <div x-show="currentView === 'loads'">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Cargas</h2>
        <button @click="$dispatch('open-modal', 'load')" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
          + Nova Carga
        </button>
      </div>
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Título</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Origem</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Destino</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Peso</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">
            <template x-for="load in loads" :key="load.id">
              <tr class="hover:bg-gray-50">
                <td class="px-6 py-4" x-text="load.title"></td>
                <td class="px-6 py-4" x-text="`${load.originCity}/${load.originState}`"></td>
                <td class="px-6 py-4" x-text="`${load.destinationCity}/${load.destinationState}`"></td>
                <td class="px-6 py-4" x-text="`${load.weightKg}kg`"></td>
                <td class="px-6 py-4">
                  <span class="px-2 py-1 text-xs rounded-full"
                    :class="{'bg-green-100 text-green-800': load.status === 'available', 'bg-yellow-100 text-yellow-800': load.status === 'pending', 'bg-blue-100 text-blue-800': load.status === 'matched'}">
                    <span x-text="load.status"></span>
                  </span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Routes -->
    <div x-show="currentView === 'routes'">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Rotas</h2>
        <button @click="$dispatch('open-modal', 'route')" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
          + Nova Rota
        </button>
      </div>
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Origem</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Destino</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Partida</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Retorno</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">
            <template x-for="route in routes" :key="route.id">
              <tr class="hover:bg-gray-50">
                <td class="px-6 py-4" x-text="`${route.originCity}/${route.originState}`"></td>
                <td class="px-6 py-4" x-text="`${route.destinationCity}/${route.destinationState}`"></td>
                <td class="px-6 py-4" x-text="route.departureDate"></td>
                <td class="px-6 py-4">
                  <span x-show="route.isReturn" class="text-green-600">✅ Sim</span>
                  <span x-show="!route.isReturn" class="text-gray-400">Não</span>
                </td>
                <td class="px-6 py-4">
                  <span class="px-2 py-1 text-xs rounded-full"
                    :class="{'bg-green-100 text-green-800': route.status === 'active'}">
                    <span x-text="route.status"></span>
                  </span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Matching -->
    <div x-show="currentView === 'matching'">
      <h2 class="text-2xl font-bold mb-6">Matching</h2>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h3 class="text-lg font-semibold mb-4">Cargas para sua Rota</h3>
          <template x-for="match in matchesForDriver" :key="match.route.id">
            <div class="border rounded-lg p-4 mb-3 hover:border-blue-300 transition-colors">
              <p class="font-medium" x-text="`${match.load.title}`"></p>
              <p class="text-sm text-gray-500" x-text="`${match.load.originCity} → ${match.load.destinationCity}`"></p>
              <p class="text-sm text-gray-500" x-text="`${match.load.weightKg}kg`"></p>
              <button class="mt-2 text-sm text-blue-600 hover:text-blue-800">Ver detalhes</button>
            </div>
          </template>
          <p x-show="matchesForDriver.length === 0" class="text-gray-400 text-sm">Nenhum match encontrado.</p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h3 class="text-lg font-semibold mb-4">Motoristas para sua Carga</h3>
          <template x-for="match in driversForLoad" :key="match.route.id">
            <div class="border rounded-lg p-4 mb-3 hover:border-blue-300 transition-colors">
              <p class="font-medium" x-text="`${match.driver?.name}`"></p>
              <p class="text-sm text-gray-500" x-text="`${match.route.originCity} → ${match.route.destinationCity}`"></p>
              <p class="text-sm text-gray-500" x-text="`Veículo: ${match.vehicle?.model}`"></p>
              <button class="mt-2 text-sm text-blue-600 hover:text-blue-800">Ver detalhes</button>
            </div>
          </template>
          <p x-show="driversForLoad.length === 0" class="text-gray-400 text-sm">Nenhum motorista disponível.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="src/js/app.js"></script>
</body>
</html>
