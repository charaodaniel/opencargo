<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OpenCargo — Logística Colaborativa</title>
  <meta name="description" content="OpenCargo - Plataforma open source para logística colaborativa" />

  <!-- ═══ PWA Meta Tags ═══ -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OpenCargo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="OpenCargo" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon-512.svg" />

  <!-- ═══ Tailwind CSS CDN ═══ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
            popover: {
              DEFAULT: "hsl(var(--popover))",
              foreground: "hsl(var(--popover-foreground))",
            },
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            success: {
              DEFAULT: "hsl(var(--success))",
              foreground: "hsl(var(--success-foreground))",
            },
            warning: {
              DEFAULT: "hsl(var(--warning))",
              foreground: "hsl(var(--warning-foreground))",
            },
            sidebar: {
              DEFAULT: "hsl(var(--sidebar-background))",
              foreground: "hsl(var(--sidebar-foreground))",
              primary: "hsl(var(--sidebar-primary))",
              "primary-foreground": "hsl(var(--sidebar-primary-foreground))",
              accent: "hsl(var(--sidebar-accent))",
              "accent-foreground": "hsl(var(--sidebar-accent-foreground))",
              border: "hsl(var(--sidebar-border))",
              ring: "hsl(var(--sidebar-ring))",
            },
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
        },
      },
    };
  </script>

  <!-- Leaflet CSS (carregado sob demanda pelo MapsPage) -->

  <!-- ═══ Custom Styles ═══ -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- ═══ Favicon ═══ -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg" />
  <link rel="mask-icon" href="assets/icons/icon-192.svg" color="#2563eb" />
</head>
<body class="bg-background text-foreground min-h-screen antialiased">

  <!-- ══════════════════ APP ROOT ══════════════════ -->
  <div id="app"></div>

  <!-- ══════════════════ SCRIPTS ══════════════════ -->

  <!-- Configuração de ambiente (editável para produção) -->
  <script src="assets/js/env.js"></script>

  <!-- Internacionalização (i18n) -->
  <script src="assets/js/i18n/pt-BR.js"></script>
  <script src="assets/js/i18n/en.js"></script>
  <script src="assets/js/i18n/i18n.js"></script>

  <!-- Utilitários (ordem: dependências primeiro) -->
  <script src="assets/js/utils/config.js"></script>
  <script src="assets/js/utils/storage.js"></script>
  <script src="assets/js/utils/utils.js"></script>
  <script src="assets/js/utils/api.js"></script>
  <script src="assets/js/utils/geocoding.js"></script>
  <script src="assets/js/utils/icons.js"></script>

  <!-- Componentes -->
  <script src="assets/js/components/Toast.js"></script>
  <script src="assets/js/components/Modal.js"></script>
  <script src="assets/js/components/Table.js"></script>
  <script src="assets/js/components/Card.js"></script>
  <script src="assets/js/components/Navbar.js"></script>
  <script src="assets/js/components/Sidebar.js"></script>

  <!-- Páginas -->
  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/pages/companies.js"></script>
  <script src="assets/js/pages/drivers.js"></script>
  <script src="assets/js/pages/vehicles.js"></script>
  <script src="assets/js/pages/routes.js"></script>
  <script src="assets/js/pages/loads.js"></script>
  <script src="assets/js/pages/matching.js"></script>
  <script src="assets/js/pages/chat.js"></script>
  <script src="assets/js/pages/documents.js"></script>
  <script src="assets/js/pages/reviews.js"></script>
  <script src="assets/js/pages/freights.js"></script>
  <script src="assets/js/pages/notifications.js"></script>
  <script src="assets/js/pages/maps.js"></script>
  <script src="assets/js/pages/login.js"></script>
  <script src="assets/js/pages/landing.js"></script>
  <script src="assets/js/pages/admin-users.js"></script>

  <!-- Router + App (devem ser os últimos) -->
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
