<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OpenCargo — Logística Colaborativa</title>
  <meta name="description" content="OpenCargo - Plataforma open source para logística colaborativa" />

  <!-- ═══ PWA Meta Tags ═══ -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OpenCargo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="OpenCargo" />

  <!-- ═══ Tailwind CSS (compilado localmente) ═══ -->
  <link rel="stylesheet" href="assets/css/tailwind.min.css" />

  <!-- Leaflet CSS (carregado sob demanda pelo MapsPage) -->

  <!-- ═══ Chart.js ═══ -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- ═══ Custom Styles ═══ -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- ═══ Favicon ═══ -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/logo-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/logo-512.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/logo-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/logo-512.png" />
  <link rel="mask-icon" href="assets/icons/logo-192.png" color="#2563eb" />
</head>
<body class="bg-background text-foreground min-h-screen antialiased">

  <!-- ══════════════════ SPLASH SCREEN ══════════════════ -->
  <div id="splash-screen" class="splash-screen" aria-hidden="true">
    <div class="splash-content">
      <!-- Logo animado -->
      <div class="splash-logo-wrapper">
        <img src="assets/icons/logo-192.png" alt="OpenCargo" class="splash-logo-img" />
      </div>
      <!-- Texto -->
      <h1 class="splash-title">OpenCargo</h1>
      <p class="splash-subtitle">Logística Colaborativa</p>
      <!-- Loading bar -->
      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════ APP ROOT ══════════════════ -->
  <div id="app"></div>

  <!-- ══════════════════ SCRIPTS ══════════════════ -->

  <!-- Configuração de ambiente (editável para produção) -->
  <script src="assets/js/env.js"></script>

  <!-- Utilitários (ordem: dependências primeiro) -->
  <script src="assets/js/utils/config.js"></script>
  <script src="assets/js/utils/storage.js"></script>
  <script src="assets/js/utils/utils.js"></script>
  <script src="assets/js/utils/api.js"></script>
  <script src="assets/js/utils/geocoding.js"></script>
  <script src="assets/js/utils/icons.js"></script>
  <script src="assets/js/utils/offline-queue.js"></script>

  <!-- Internacionalização (i18n) -->
  <script src="assets/js/i18n/pt-BR.js"></script>
  <script src="assets/js/i18n/en.js"></script>
  <script src="assets/js/i18n/i18n.js"></script>

  <!-- Componentes -->
  <script src="assets/js/components/Toast.js"></script>
  <script src="assets/js/components/Modal.js"></script>
  <script src="assets/js/components/Table.js"></script>
  <script src="assets/js/components/Card.js"></script>
  <script src="assets/js/components/Navbar.js"></script>
  <script src="assets/js/components/Sidebar.js"></script>

  <!-- Páginas -->
  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/pages/companies.js"></script>
  <script src="assets/js/pages/drivers.js"></script>
  <script src="assets/js/pages/vehicles.js"></script>
  <script src="assets/js/pages/routes.js"></script>
  <script src="assets/js/pages/loads.js"></script>
  <script src="assets/js/pages/matching.js"></script>
  <script src="assets/js/pages/chat.js"></script>
  <script src="assets/js/pages/documents.js"></script>
  <script src="assets/js/pages/reviews.js"></script>
  <script src="assets/js/pages/freights.js"></script>
  <script src="assets/js/pages/notifications.js"></script>
  <script src="assets/js/pages/maps.js"></script>
  <script src="assets/js/pages/login.js"></script>
  <script src="assets/js/pages/landing.js"></script>
  <script src="assets/js/pages/admin-users.js"></script>
  <script src="assets/js/pages/settings.js"></script>
  <script src="assets/js/pages/logs.js"></script>
  <script src="assets/js/pages/alerts.js"></script>
  <script src="assets/js/pages/audit.js"></script>

  <!-- Router + App (devem ser os últimos) -->
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
